<svg width="236" height="236" viewBox="0 0 236 236" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>

  <!-- Outer metallic ring - steel chrome -->
  <radialGradient id="rg_ring" cx="38%" cy="28%" r="72%" gradientUnits="objectBoundingBox">
    <stop offset="0%"   stop-color="#DCDCDC"/>
    <stop offset="25%"  stop-color="#B8B8B8"/>
    <stop offset="55%"  stop-color="#888888"/>
    <stop offset="85%"  stop-color="#606060"/>
    <stop offset="100%" stop-color="#404040"/>
  </radialGradient>

  <!-- Gauge face - dark matte -->
  <radialGradient id="rg_face" cx="50%" cy="38%" r="62%" gradientUnits="objectBoundingBox">
    <stop offset="0%"   stop-color="#232323"/>
    <stop offset="100%" stop-color="#0A0A0A"/>
  </radialGradient>

  <!-- Bolt head - small chrome -->
  <radialGradient id="rg_bolt" cx="30%" cy="30%" r="70%" gradientUnits="objectBoundingBox">
    <stop offset="0%"   stop-color="#D8D8D8"/>
    <stop offset="60%"  stop-color="#909090"/>
    <stop offset="100%" stop-color="#484848"/>
  </radialGradient>

  <!-- Needle - amber brand color -->
  <linearGradient id="rg_needle" x1="118" y1="52" x2="118" y2="132" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#FFD040"/>
    <stop offset="100%" stop-color="#BB5500"/>
  </linearGradient>

  <!-- Center cap - chrome knob -->
  <radialGradient id="rg_cap" cx="32%" cy="28%" r="70%" gradientUnits="objectBoundingBox">
    <stop offset="0%"   stop-color="#E8E8E8"/>
    <stop offset="50%"  stop-color="#909090"/>
    <stop offset="100%" stop-color="#303030"/>
  </radialGradient>

  <!-- Drop shadow for the gauge -->
  <filter id="f_shadow" x="-12%" y="-12%" width="124%" height="124%">
    <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000000" flood-opacity="0.65"/>
  </filter>

  <!-- Glow for green arc -->
  <filter id="f_glow_g" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Glow for red arc -->
  <filter id="f_glow_r" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Glow for needle -->
  <filter id="f_glow_n" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

</defs>

<!-- ── Outer metallic ring ── -->
<circle cx="118" cy="118" r="111" fill="url(#rg_ring)" filter="url(#f_shadow)"/>
<!-- Rim highlight (top arc) -->
<circle cx="118" cy="118" r="111" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1.2"/>
<!-- Rim shadow (bottom arc) -->
<circle cx="118" cy="118" r="111" fill="none" stroke="rgba(0,0,0,0.50)" stroke-width="1.2"
        stroke-dasharray="220 478" stroke-dashoffset="-129"/>

<!-- ── Dark inset groove ── -->
<circle cx="118" cy="118" r="101" fill="#080808"/>
<circle cx="118" cy="118" r="101" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1.5"/>

<!-- ── Gauge face ── -->
<circle cx="118" cy="118" r="99" fill="url(#rg_face)"/>

<!-- Subtle concentric decoration ring -->
<circle cx="118" cy="118" r="94" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

<!-- ── 6 hex bolts on the metallic ring ── -->
<!-- top -->      <circle cx="118.0" cy="14.0"  r="5.5" fill="url(#rg_bolt)"/><circle cx="118.0" cy="14.0"  r="5.5" fill="none" stroke="#282828" stroke-width="0.8"/>
<!-- top-right --> <circle cx="208.1" cy="66.0"  r="5.5" fill="url(#rg_bolt)"/><circle cx="208.1" cy="66.0"  r="5.5" fill="none" stroke="#282828" stroke-width="0.8"/>
<!-- bot-right --> <circle cx="208.1" cy="170.0" r="5.5" fill="url(#rg_bolt)"/><circle cx="208.1" cy="170.0" r="5.5" fill="none" stroke="#282828" stroke-width="0.8"/>
<!-- bottom -->    <circle cx="118.0" cy="222.0" r="5.5" fill="url(#rg_bolt)"/><circle cx="118.0" cy="222.0" r="5.5" fill="none" stroke="#282828" stroke-width="0.8"/>
<!-- bot-left -->  <circle cx="27.9"  cy="170.0" r="5.5" fill="url(#rg_bolt)"/><circle cx="27.9"  cy="170.0" r="5.5" fill="none" stroke="#282828" stroke-width="0.8"/>
<!-- top-left -->  <circle cx="27.9"  cy="66.0"  r="5.5" fill="url(#rg_bolt)"/><circle cx="27.9"  cy="66.0"  r="5.5" fill="none" stroke="#282828" stroke-width="0.8"/>

<!-- Bolt slot marks (screw-head cross) -->
<line x1="118.0" y1="10.5" x2="118.0" y2="17.5" stroke="#383838" stroke-width="1.2"/>
<line x1="114.5" y1="14.0" x2="121.5" y2="14.0" stroke="#383838" stroke-width="1.2"/>
<line x1="208.1" y1="62.5" x2="208.1" y2="69.5" stroke="#383838" stroke-width="1.2"/>
<line x1="204.6" y1="66.0" x2="211.6" y2="66.0" stroke="#383838" stroke-width="1.2"/>
<line x1="208.1" y1="166.5" x2="208.1" y2="173.5" stroke="#383838" stroke-width="1.2"/>
<line x1="204.6" y1="170.0" x2="211.6" y2="170.0" stroke="#383838" stroke-width="1.2"/>
<line x1="118.0" y1="218.5" x2="118.0" y2="225.5" stroke="#383838" stroke-width="1.2"/>
<line x1="114.5" y1="222.0" x2="121.5" y2="222.0" stroke="#383838" stroke-width="1.2"/>
<line x1="27.9"  y1="166.5" x2="27.9"  y2="173.5" stroke="#383838" stroke-width="1.2"/>
<line x1="24.4"  y1="170.0" x2="31.4"  y2="170.0" stroke="#383838" stroke-width="1.2"/>
<line x1="27.9"  y1="62.5"  x2="27.9"  y2="69.5"  stroke="#383838" stroke-width="1.2"/>
<line x1="24.4"  y1="66.0"  x2="31.4"  y2="66.0"  stroke="#383838" stroke-width="1.2"/>

<!-- ── Scale arc track (dim background) ── -->
<!-- Full 270° sweep: from 225° to 135° measured from top, large-arc=1, sweep=1 -->
<path d="M 54.4 181.6 A 90 90 0 1 1 181.6 181.6"
      stroke="rgba(255,255,255,0.10)" stroke-width="5" fill="none" stroke-linecap="round"/>

<!-- Green arc: 0% → 80% -->
<path d="M 54.4 181.6 A 90 90 0 1 1 206.9 103.9"
      stroke="#3EE87A" stroke-width="4.5" fill="none" stroke-linecap="round"
      filter="url(#f_glow_g)" opacity="0.88"/>

<!-- Red arc: 80% → 100% -->
<path d="M 206.9 103.9 A 90 90 0 0 1 181.6 181.6"
      stroke="#FF4040" stroke-width="4.5" fill="none" stroke-linecap="round"
      filter="url(#f_glow_r)" opacity="0.88"/>

<!-- ── Major ticks (white, 12px, at every 10%) ── -->
<line x1="55.8"  y1="180.2" x2="64.3"  y2="171.7" stroke="rgba(255,255,255,0.85)" stroke-width="2.2" stroke-linecap="round"/>
<line x1="34.3"  y1="145.2" x2="45.7"  y2="141.5" stroke="rgba(255,255,255,0.85)" stroke-width="2.2" stroke-linecap="round"/>
<line x1="31.1"  y1="104.2" x2="42.9"  y2="106.1" stroke="rgba(255,255,255,0.85)" stroke-width="2.2" stroke-linecap="round"/>
<line x1="46.8"  y1="66.3"  x2="56.5"  y2="73.3"  stroke="rgba(255,255,255,0.85)" stroke-width="2.2" stroke-linecap="round"/>
<line x1="78.0"  y1="39.6"  x2="83.5"  y2="50.3"  stroke="rgba(255,255,255,0.85)" stroke-width="2.2" stroke-linecap="round"/>
<line x1="118.0" y1="30.0"  x2="118.0" y2="42.0"  stroke="rgba(255,255,255,0.85)" stroke-width="2.2" stroke-linecap="round"/>
<line x1="158.0" y1="39.6"  x2="152.5" y2="50.3"  stroke="rgba(255,255,255,0.85)" stroke-width="2.2" stroke-linecap="round"/>
<line x1="189.2" y1="66.3"  x2="179.5" y2="73.3"  stroke="rgba(255,255,255,0.85)" stroke-width="2.2" stroke-linecap="round"/>
<!-- 80–100% ticks in red zone -->
<line x1="204.9" y1="104.2" x2="193.1" y2="106.1" stroke="rgba(255,100,100,0.90)" stroke-width="2.2" stroke-linecap="round"/>
<line x1="201.7" y1="145.2" x2="190.3" y2="141.5" stroke="rgba(255,100,100,0.90)" stroke-width="2.2" stroke-linecap="round"/>
<line x1="180.2" y1="180.2" x2="171.7" y2="171.7" stroke="rgba(255,100,100,0.90)" stroke-width="2.2" stroke-linecap="round"/>

<!-- ── Minor ticks (half-width, dim, at every 5%) ── -->
<line x1="43.0"  y1="164.0" x2="48.1"  y2="160.8" stroke="rgba(255,255,255,0.40)" stroke-width="1.4" stroke-linecap="round"/>
<line x1="30.3"  y1="124.9" x2="36.3"  y2="124.4" stroke="rgba(255,255,255,0.40)" stroke-width="1.4" stroke-linecap="round"/>
<line x1="36.7"  y1="84.3"  x2="42.2"  y2="86.6"  stroke="rgba(255,255,255,0.40)" stroke-width="1.4" stroke-linecap="round"/>
<line x1="60.8"  y1="51.1"  x2="64.7"  y2="55.6"  stroke="rgba(255,255,255,0.40)" stroke-width="1.4" stroke-linecap="round"/>
<line x1="97.5"  y1="32.4"  x2="98.9"  y2="38.3"  stroke="rgba(255,255,255,0.40)" stroke-width="1.4" stroke-linecap="round"/>
<line x1="138.5" y1="32.4"  x2="137.1" y2="38.3"  stroke="rgba(255,255,255,0.40)" stroke-width="1.4" stroke-linecap="round"/>
<line x1="175.2" y1="51.1"  x2="171.3" y2="55.6"  stroke="rgba(255,255,255,0.40)" stroke-width="1.4" stroke-linecap="round"/>
<line x1="199.3" y1="84.3"  x2="193.8" y2="86.6"  stroke="rgba(255,255,255,0.30)" stroke-width="1.4" stroke-linecap="round"/>
<line x1="205.7" y1="124.9" x2="199.7" y2="124.4" stroke="rgba(255,255,255,0.30)" stroke-width="1.4" stroke-linecap="round"/>
<line x1="193.0" y1="164.0" x2="187.9" y2="160.8" stroke="rgba(255,255,255,0.30)" stroke-width="1.4" stroke-linecap="round"/>

<!-- ── Needle at 60% (amber, pointing upper-right) ── -->
<!-- Needle glow halo -->
<line x1="118" y1="118" x2="151.6" y2="52.1"
      stroke="rgba(255,180,0,0.25)" stroke-width="8" stroke-linecap="round"/>
<!-- Needle polygon: tip, left-base, tail-counterweight, right-base -->
<polygon points="151.6,52.1 121.6,119.8 111.6,130.5 114.4,116.2"
         fill="url(#rg_needle)" filter="url(#f_glow_n)"/>

<!-- ── Center chrome cap ── -->
<circle cx="118" cy="118" r="11"  fill="url(#rg_cap)"/>
<circle cx="118" cy="118" r="11"  fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
<circle cx="118" cy="118" r="4.5" fill="rgba(255,255,255,0.55)"/>

</svg>
